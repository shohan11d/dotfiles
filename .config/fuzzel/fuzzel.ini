include="~/.config/fuzzel/colors.ini"
font=JetBrainsMono NFM:size=12
icon-theme=Papirus-Dark
terminal=kitty -1
show-actions=yes
lines=10
width=35
horizontal-padding=20
vertical-pad=12
inner-pad=8
prompt=">>  "
layer=overlay
exit-on-keyboard-focus-loss=yes

[border]
radius=0
width=1

[dmenu]
exit-immediately-if-empty=yes
