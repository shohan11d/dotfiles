# Variables
$mod = Super
$altMod  = Alt
$webApp  = $browser --app
$browser = uwsm app -- google-chrome --new-window --ozone-platform=wayland

# Window management
bind = $mod, W, killactive,
bind = $mod, Q, killactive,
bind = $mod, J, togglefloating,
bind = $mod, O, togglesplit, 
bind = $mod, P, fullscreen, 1
## Special
bind = $mod, S, togglespecialworkspace, scratch # Toggle scratchpad
bind = $mod, mouse:275, togglespecialworkspace, # [hidden]
bind = Super+Ctrl, S, movetoworkspacesilent, special # Send to scratchpad
bind = Ctrl+Super, S, togglespecialworkspace, # [hidden]

# Window Focus 
bind = $mod, n, movefocus, l
bind = $mod, i, movefocus, r
bind = $mod, u, movefocus, u
bind = $mod, e, movefocus, d

# Window Focus Arrows
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d



# Move windows
bind = $mod Shift, n, movewindow, l
bind = $mod Shift, i, movewindow, r
bind = $mod Shift, u, movewindow, u
bind = $mod Shift, e, movewindow, d

# Move windows Arrow
bind = $mod Shift, left, movewindow, l
bind = $mod Shift, right, movewindow, r
bind = $mod Shift, up, movewindow, u
bind = $mod Shift, down, movewindow, d
# Applications
bind = $mod, T, exec, kitty
# bind = $mod, C, exec, code
bind = $mod, RETURN, exec, kitty
bindd = $mod, L, File manager, exec, uwsm-app -- nautilus --new-window
bind = $mod, D, exec, vicinae toggle
# bind = $mod, D, exec, walker
# bind = $altMod, SUPER_L, exec, vicinae toggle
# bind = $mod, L, exec, hyprlock
bind = $mod, M, exec,hyprpicker -a
bind = $mod, N, exec,makoctl dismiss --all
#bind = $mod, H, exec, pkill waybar && waybar &

bind = $mod, b, exec, google-chrome
bind = $mod, A, exec, code
#bind = $mod, Y, exec, google-chrome "https://youtube.com"
bind = $mod, Y, exec, kitty yazi
bindd = $mod, F, ChatGPT, exec, $webApp="https://chatgpt.com"

# bind = , ALT_L, exec, vicinae toggle

# Universal copy, paste...
bindd = $mod, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = $mod, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = $mod, X, Universal cut, sendshortcut, CTRL, X,

# Grouping
bindd = $mod, G, $d toggle group, togglegroup

# Audio Keybinds
bind = $mod, code:73, exec, pactl set-default-sink alsa_output.pci-0000_00_1f.3.analog-stereo  # alt + f7 -> swich to speaker
bind = $mod, code:74, exec, pactl set-default-sink alsa_output.usb-Apple__Inc._USB-C_to_3.5mm_Headphone_Jack_Adapter_DWH028204G2JKLTAG-00.analog-stereo # alt + tf8 -> swich to headphone
bind = $mod, h, exec, playerctl position 10- # global seek behind
bind = $mod, comma, exec, playerctl position 10+ # global seek behind
bind = $mod, semicolon, exec, playerctl play-pause
bind = RSHIFT, UP, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bind = RSHIFT, DOWN, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-

# Monitor bindings
bind = $mod Shift, R, exec, bash -c 'hyprctl keyword monitor "HDMI-A-2,1920x1080@120,0x0,1" && hyprctl keyword monitor "HDMI-A-3,1920x1080@100,-1080x0,1,transform,1"'


# Workspace Keybinds
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, f1, workspace, 10
bind = $mod, f2, workspace, 11
bind = $mod, f3, workspace, 12

# Move active window to a workspace
bind = $mod Shift, 1, movetoworkspacesilent, 1
bind = $mod Shift, 2, movetoworkspacesilent, 2
bind = $mod Shift, 3, movetoworkspacesilent, 3
bind = $mod Shift, 4, movetoworkspacesilent, 4
bind = $mod Shift, 5, movetoworkspacesilent, 5
bind = $mod Shift, 6, movetoworkspacesilent, 6
bind = $mod Shift, 7, movetoworkspacesilent, 7
bind = $mod Shift, 8, movetoworkspacesilent, 8
bind = $mod Shift, 9, movetoworkspacesilent, 9
bind = $mod Shift, f1, movetoworkspacesilent, 10
bind = $mod Shift, f2, movetoworkspacesilent, 11
bind = $mod Shift, f3, movetoworkspacesilent, 12


# Mouse keybinds
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow



bind =, Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png 
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png 
