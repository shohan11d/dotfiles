
# Apps
bind = $mod, Return, exec, $terminal 
bind = $mod, T, exec, $terminal 
bind = $mod, L, exec, $fileManager 
bind = Super, B, exec, $browser # 
bind = $mod, h, exec, hyprpicker -a 
bind = $mod, Y, exec, kitty yazi 
bind = $mod, D, exec, fuzzel 
bind = $mod, A, exec, code 
bind = $mod, K, exec, hyprlock 
bind = $mod, F, exec, google-chrome --new-window https://chatgpt.com
bind = $mod CTRL, E, exec, flatpak run com.tomjwatson.Emote
bind = $mod CTRL, C, exec, kcalc # Open the calculator

# Display
bind = $mod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom

# Windows
bind = $mod, W, killactive
bind = $mod, Q, killactive
bind = $mod SHIFT, W, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bind = $mod, P, fullscreen, 1 
bind = $mod, M, fullscreen, 0
bind = $mod, J, togglefloating,     
bind = $mod Shift, J, togglefloating
bind = $mod Shift, J, pin
bind = $mod, O, layoutmsg, togglesplit                                                  # Toggle split
bindd = $mod, G, toggle group, togglegroup # Toggle group
bind = $mod1 SHIFT, i, resizeactive, 100 0                                           # Increase window width with keyboard
bind = $mod1 SHIFT, n, resizeactive, -100 0                                           # Reduce window width with keyboard
bind = $mod1 SHIFT, e, resizeactive, 0 100                                            # Increase window height with keyboard
bind = $mod1 SHIFT, u, resizeactive, 0 -100  
bind = $mod1 SHIFT, right, resizeactive, 100 0                                           # Increase window width with keyboard
bind = $mod1 SHIFT, left, resizeactive, -100 0                                           # Reduce window width with keyboard
bind = $mod1 SHIFT, down, resizeactive, 0 100                                            # Increase window height with keyboard
bind = $mod1 SHIFT, up, resizeactive, 0 -100  
bind = $mod, O, layoutmsg, swapsplit                                                    # Swapsplit

# Actions
bind = $mod CTRL, R, exec, hyprctl reload        
bind = $mod CTRL, W, exec, kitty -e waypaper


# Screenshots
bind = , PRINT, exec, grimblast copysave output
bind = $mod, PRINT, exec, grimblast copysave area

# Universal copy/paste/cut
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X

# Audio 

bind = $mod, code:73, exec, pactl set-default-sink alsa_output.pci-0000_00_1f.3.analog-stereo 
bind = $mod, code:74, exec, pactl set-default-sink alsa_output.usb-Apple__Inc._USB-C_to_3.5mm_Headphone_Jack_Adapter_DWH028204G2JKLTAG-00.analog-stereo 
bind = RSHIFT, UP, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bind = RSHIFT, DOWN, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-

# Global media controls
bind = $mod, H, exec, playerctl position 10-
bind = $mod, comma, exec, playerctl position 10+
bind = $mod, semicolon, exec, playerctl play-pause

# Focus windows 
bind = $mod, n, movefocus, l
bind = $mod, i, movefocus, r
bind = $mod, u, movefocus, u
bind = $mod, e, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move Windows
bind = $mod Shift, n, movewindow, l
bind = $mod Shift, i, movewindow, r
bind = $mod Shift, u, movewindow, u
bind = $mod Shift, e, movewindow, d
bind = $mod Shift, left, movewindow, l
bind = $mod Shift, right, movewindow, r
bind = $mod Shift, up, movewindow, u
bind = $mod Shift, down, movewindow, d

bind = $mod, S, togglespecialworkspace, scratch # Toggle scratchpad
# bind = $mod, q, movetoworkspacesilent, special:scratch 


# Focus Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, f1, workspace, 10
bind = $mod, f2, workspace, 11
bind = $mod, f3, workspace, 12

# Move windows to workspaces
bind = $mod Shift, 1, movetoworkspacesilent, 1
bind = $mod Shift, 2, movetoworkspacesilent, 2
bind = $mod Shift, 3, movetoworkspacesilent, 3
bind = $mod Shift, 4, movetoworkspacesilent, 4
bind = $mod Shift, 5, movetoworkspacesilent, 5
bind = $mod Shift, 6, movetoworkspacesilent, 6
bind = $mod Shift, 7, movetoworkspacesilent, 7
bind = $mod Shift, 8, movetoworkspacesilent, 8
bind = $mod Shift, 9, movetoworkspacesilent, 9
bind = $mod Shift, f1, movetoworkspacesilent, 10
bind = $mod Shift, f2, movetoworkspacesilent, 11
bind = $mod Shift, f3, movetoworkspacesilent, 12

# Mouse controls
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

