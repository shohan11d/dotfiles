
general {
    gaps_in = 4
    gaps_out = 5

    border_size = 1

    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false

    col.active_border = rgba(0DB7D455)
    col.inactive_border = rgba(31313600)
    resize_on_border = true

    no_focus_fallback = true

    snap {
      enabled = true
    	window_gap = 4
    	monitor_gap = 5
    	respect_gaps = true
    }
}

dwindle {
    smart_resizing = false
}

decoration {
    rounding = 0
    border_part_of_window = true
       
  active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1.0

     blur {
        enabled = false
        size = 10
        passes = 3
        new_optimizations = on
        special = true
        brightness = 0.60
        contrast = 0.75
    }

    shadow {
        enabled = false
        range = 2
        render_power = 3
        color = rgba(00000050)
    }

    #Dim
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.3
}



group {
    # col.border_active = $activeBorderColor
    # col.border_inactive = $inactiveBorderColor
    col.border_locked_active = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}



animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # Configs
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    # fade
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    # workspaces
    animation = workspaces, 1, 7, menu_decel, slide
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    # zoom
    animation = zoomFactor, 1, 3, standardDecel
}




input {
    kb_layout = us
    repeat_delay = 250
    repeat_rate = 35
    accel_profile = flat
    off_window_axis_events = 2
    follow_mouse = 1
    sensitivity = 0 

   touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 1.0
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    # pretty cool below one
    enable_swallow = true
    swallow_regex = (kitty|foot|allacritty|Alacritty)
    focus_on_activate = true
    vfr = true
}

debug {
    # suppress_errors = true
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

cursor {
    hide_on_key_press = true
}

