# Start Polkit
exec-once = /usr/libexec/polkit-mate-authentication-agent-1

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh
exec-once = gsettings set org.gnome.desktop.interface font-name 'Open Sans 11'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark" 
exec-once = gsettings set org.gnome.desktop.wm.preferences theme "adw-gtk3-dark"

# Load Notification Daemon
exec-once = swaync
exec-once = hypridle
exec-once = waybar
exec-once = hyprpaper
exec-once = otd-daemon
exec-once = fcitx5
exec-once = hyprpm reload
exec-once = vicinae server
exec-once = vicinae server
exec-once = walker --gapplication-service
exec-once = swww-daemon
exec-once = elephant
exec-once = mako

# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Core components (authentication, lock screen, notification daemon)
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Some fix idk
exec-once = hyprpm reload
exec-once = waypaper --restore

# Load cliphist history
exec-once = wl-paste --watch cliphist store
exec-once = wl-paste --type text --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
exec-once = wl-paste --type image --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
